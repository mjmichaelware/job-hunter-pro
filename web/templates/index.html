<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Hunter Pro</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <span class="app-header__title">Job Hunter Pro</span>
    <span id="health-strip">Checking backend…</span>
  </header>

  <nav class="app-nav" id="main-nav">
    <!-- nav buttons injected by app.js -->
  </nav>

  <main class="app-main">
    <h2 id="view-title" class="section-heading" style="margin-top:0; margin-bottom:12px;"></h2>
    <div id="view-mount">
      <p class="state-loading">Initializing…</p>
    </div>
  </main>

</div>

<script>
// Kill any old service worker + caches from the previous PWA frontend so the
// browser stops serving the deleted cockpit shell.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then(rs => rs.forEach(r => r.unregister()))
    .catch(function() {});
}
if (window.caches && caches.keys) {
  caches.keys().then(function(keys) { keys.forEach(function(k) { caches.delete(k); }); }).catch(function() {});
}
</script>
<script src="/static/js/api.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/views.js"></script>
</body>
</html>

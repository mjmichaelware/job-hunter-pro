<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jobs</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ffffff; color: #000000; }
  body { font-family: sans-serif; font-size: 16px; line-height: 1.4; padding: 16px; max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  h2 { font-size: 16px; margin: 24px 0 8px; }
  #status { margin: 8px 0 16px; }
  button { font: inherit; padding: 8px 14px; border: 1px solid #000; background: #fff; color: #000; cursor: pointer; }
  .job { border-top: 1px solid #000; padding: 12px 0; }
  .job .title { font-weight: bold; }
  .job .meta { font-size: 14px; margin-top: 2px; }
  .job .flags { font-size: 13px; margin-top: 4px; }
  a { color: #000; }
</style>
</head>
<body>
  <h1>Jobs</h1>
  <div id="status">Loading…</div>
  <button id="reload" type="button">Reload (runs live discovery)</button>
  <div id="accepted"></div>
  <div id="unresolved"></div>

<script>
// Kill any old service worker + caches from the previous PWA frontend so the
// browser stops serving the deleted cockpit shell.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister())).catch(() => {});
}
if (window.caches && caches.keys) {
  caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(() => {});
}

function esc(v) {
  return String(v == null ? '' : v)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function pick(obj, keys, fallback) {
  for (const k of keys) {
    const v = obj ? obj[k] : undefined;
    if (v !== undefined && v !== null && v !== '') return v;
  }
  return fallback;
}

function href(v) {
  const s = String(v || '').trim();
  return (s.startsWith('http://') || s.startsWith('https://')) ? s : '';
}

function jobHtml(job) {
  const title = esc(pick(job, ['title', 'job_title', 'name'], 'Untitled role'));
  const company = esc(pick(job, ['company', 'company_name', 'restaurant_name', 'employer', 'place_name'], 'Company not listed'));
  const location = esc(pick(job, ['resolved_address', 'normalized_address', 'location', 'listing_location', 'detected_location'], 'Location not resolved'));
  const source = esc(pick(job, ['source', '_provider', 'provider', 'via'], 'source'));
  const url = href(pick(job, ['source_url', 'url', 'apply_url', 'share_link'], ''));
  const flags = []
    .concat(Array.isArray(job.resolution_flags) ? job.resolution_flags : [])
    .concat(Array.isArray(job.reasons) ? job.reasons : []);
  return '<div class="job">'
    + '<div class="title">' + title + '</div>'
    + '<div class="meta">' + company + ' · ' + location + ' · ' + source + '</div>'
    + (flags.length ? '<div class="flags">' + esc(flags.join(', ')) + '</div>' : '')
    + (url ? '<div class="meta"><a href="' + esc(url) + '" target="_blank" rel="noopener">Open / Apply</a></div>' : '')
    + '</div>';
}

function arr(payload, keys) {
  for (const k of keys) {
    if (payload && Array.isArray(payload[k])) return payload[k];
  }
  return [];
}

async function load() {
  const status = document.getElementById('status');
  const acc = document.getElementById('accepted');
  const unres = document.getElementById('unresolved');
  status.textContent = 'Running live discovery — one moment…';
  acc.innerHTML = '';
  unres.innerHTML = '';
  try {
    const res = await fetch('/api/jobs?dry_run=0');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const jobs = arr(data, ['data', 'jobs', 'accepted', 'results']);
    const rejected = arr(data, ['rejected']);
    const raw = data.raw_count != null ? data.raw_count : (jobs.length + rejected.length);
    const count = data.count != null ? data.count : jobs.length;

    status.textContent = count + ' jobs · ' + raw + ' raw scanned · ' + rejected.length + ' need resolution';

    if (jobs.length) {
      acc.innerHTML = jobs.map(jobHtml).join('');
    } else {
      acc.innerHTML = '<p>No jobs returned by the providers.</p>';
    }

    if (rejected.length) {
      unres.innerHTML = '<h2>Need resolution (' + rejected.length + ')</h2>' + rejected.map(jobHtml).join('');
    }
  } catch (err) {
    status.textContent = 'Could not load jobs: ' + err.message + '. The live endpoint can be slow if FAST_JOBS is off. Press Reload to retry.';
  }
}

document.getElementById('reload').addEventListener('click', load);
load();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="dark">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-950 p-6 text-white">
    <h1 class="text-2xl font-black text-blue-500">RESTAURANT JOBS: 84115</h1>
    <div id="list" class="mt-6 grid gap-4"></div>
    <script>
        async function load() {
            const res = await fetch('/api/get_jobs');
            const data = await res.json();
            document.getElementById('list').innerHTML = data.map(j => `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-700">
                    <h3 class="font-bold">${j.title}</h3>
                    <p class="text-blue-400 text-xs mb-3">${j.company}</p>
                    <a href="${j.url}" target="_blank" class="bg-blue-600 block text-center py-2 rounded font-bold text-xs">APPLY</a>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>

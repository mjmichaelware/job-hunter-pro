<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Job Hunter Pro</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/a11y.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/shaders.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/components/buttons.css">
  <link rel="stylesheet" href="/static/css/components/cards.css">
  <link rel="stylesheet" href="/static/css/components/badges.css">

</head>
<body>
<a href="#view-mount" class="skip-link">Skip to content</a>

<canvas id="halo-canvas" aria-hidden="true"></canvas>

<!-- one-per-session animated launch sequence (boot_sequence.js controls it) -->
<div id="boot-splash" hidden aria-hidden="true">
  <svg id="boot-mark" viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
    <circle class="boot-mark__halo" cx="60" cy="60" r="44"/>
    <path class="boot-mark__stroke" d="M78 26 L78 78 a22 22 0 1 1 -22 -22" fill="none"/>
  </svg>
  <div class="boot-splash__name">JOB HUNTER PRO</div>
</div>

<div class="app-shell">

  <header class="app-header">
    <div class="app-header__left"></div>
    <button type="button" id="app-title" class="app-header__title" data-i18n="app.title" aria-label="Job Hunter Pro — go home">Job Hunter Pro</button>
    <div class="app-header__tools">
      <button type="button" id="btn-command" class="icon-btn" aria-label="Open command palette" title="Search (⌘K)">⌘K</button>
      <select id="lang-select" class="lang-select" aria-label="Language">
        <option value="en">EN</option>
        <option value="es">ES</option>
        <option value="ru">RU</option>
      </select>
    </div>
  </header>

  <nav class="app-nav" id="main-nav" aria-label="Primary">
    <!-- nav buttons injected by core/router.js -->
  </nav>

  <main class="app-main">
    <h2 id="view-title" class="view-title"></h2>
    <div id="view-mount" tabindex="-1">
      <p class="state-loading" data-i18n="state.init">Initializing…</p>
    </div>
  </main>

</div>

<!-- generic spring bottom-sheet host (evidence drawer, filters mount here) -->
<div id="sheet-host" class="sheet-host" hidden aria-hidden="true">
  <div class="sheet-host__scrim" data-sheet-close></div>
  <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <header class="sheet__grab"><span class="sheet__handle"></span></header>
    <h3 id="sheet-title" class="sheet__title"></h3>
    <div id="sheet-body" class="sheet__body"></div>
  </section>
</div>

<!-- screen-reader live region for state changes + pipeline counts -->
<div id="aria-live" class="visually-hidden" role="status" aria-live="polite"></div>

<script>
// Register the no-stale service worker. When a NEW worker takes control
// (replacing a previously-installed one), force one reload so the page is
// served fresh by the new network-only worker — never a cached app build.
if ('serviceWorker' in navigator) {
  var hadController = !!navigator.serviceWorker.controller;
  var reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    if (hadController && !reloaded) { reloaded = true; window.location.reload(); }
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function (reg) {
      if (reg && reg.update) { try { reg.update(); } catch (e) {} }
    }).catch(function () {});
  });
}
</script>

<!-- core engine -->
<script src="/static/js/core/api.js"></script>

<!-- visuals (feature-detected, degrade gracefully) -->

<script src="/static/js/visuals/halos.js"></script>

<!-- views (each registers itself) -->

</body>
</html>

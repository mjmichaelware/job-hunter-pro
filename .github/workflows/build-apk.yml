name: Build Android APK

# Builds the installable APK from the TWA wrapper in /twa. Runs automatically
# when the wrapper changes, and can be triggered by hand from the Actions tab.
on:
  push:
    paths:
      - 'twa/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

# Allow the workflow to publish a Release with the APK attached.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        working-directory: twa
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Print signing fingerprint (for assetlinks)
        run: |
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -alias androiddebugkey | grep "SHA256:" || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: job-hunter-pro-apk
          path: twa/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Rename APK for release
        run: cp twa/app/build/outputs/apk/debug/app-debug.apk job-hunter-pro.apk

      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: Job Hunter Pro APK (build ${{ github.run_number }})
          body: |
            Installable Android APK for Job Hunter Pro.
            Tap **job-hunter-pro.apk** below to download, then open it with your package installer.
          files: job-hunter-pro.apk
          make_latest: true

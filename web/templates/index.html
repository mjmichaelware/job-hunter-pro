<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Job Hunter Pro</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/a11y.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/shaders.css">
  <link rel="stylesheet" href="/static/css/components/buttons.css">
  <link rel="stylesheet" href="/static/css/components/cards.css">
  <link rel="stylesheet" href="/static/css/components/badges.css">
  <link rel="stylesheet" href="/static/css/components/tables.css">
  <link rel="stylesheet" href="/static/css/components/forms.css">
  <link rel="stylesheet" href="/static/css/components/command.css">
  <link rel="stylesheet" href="/static/css/motion/transitions.css">
  <link rel="stylesheet" href="/static/css/motion/animations.css">
</head>
<body>
<a href="#view-mount" class="skip-link">Skip to content</a>

<canvas id="halo-canvas" aria-hidden="true"></canvas>

<div class="app-shell">

  <header class="app-header">
    <span class="app-header__title" data-i18n="app.title">Job Hunter Pro</span>
    <div class="app-header__tools">
      <button type="button" id="btn-command" class="icon-btn" aria-label="Open command palette" title="Search (⌘K)">⌘K</button>
      <select id="lang-select" class="lang-select" aria-label="Language">
        <option value="en">EN</option>
        <option value="es">ES</option>
        <option value="ru">RU</option>
      </select>
      <span id="health-strip" class="health-strip" data-i18n="health.checking">Checking backend…</span>
    </div>
  </header>

  <main class="app-main">
    <h2 id="view-title" class="view-title"></h2>
    <div id="view-mount" tabindex="-1">
      <p class="state-loading" data-i18n="state.init">Initializing…</p>
    </div>
  </main>

  <nav class="app-nav" id="main-nav" aria-label="Primary">
    <!-- nav buttons injected by core/router.js -->
  </nav>

</div>

<!-- generic spring bottom-sheet host (evidence drawer, filters, command palette mount here) -->
<div id="sheet-host" class="sheet-host" hidden aria-hidden="true">
  <div class="sheet-host__scrim" data-sheet-close></div>
  <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <header class="sheet__grab"><span class="sheet__handle"></span></header>
    <h3 id="sheet-title" class="sheet__title"></h3>
    <div id="sheet-body" class="sheet__body"></div>
  </section>
</div>

<!-- screen-reader live region for state changes + pipeline counts -->
<div id="aria-live" class="visually-hidden" role="status" aria-live="polite"></div>

<script>
// Register the offline-dignity service worker (root scope via /sw.js header).
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function () {});
  });
}
</script>

<!-- core engine -->
<script src="/static/js/core/api.js"></script>
<script src="/static/js/core/state.js"></script>
<script src="/static/js/core/i18n.js"></script>
<script src="/static/js/core/a11y.js"></script>
<script src="/static/js/core/pwa/db.js"></script>
<script src="/static/js/core/pwa/sync.js"></script>
<script src="/static/js/core/router.js"></script>

<!-- reusable components -->
<script src="/static/js/components/format.js"></script>
<script src="/static/js/components/aria_announcer.js"></script>
<script src="/static/js/components/trust_geometry.js"></script>
<script src="/static/js/components/sheet_drawer.js"></script>
<script src="/static/js/components/evidence_drawer.js"></script>
<script src="/static/js/components/job_bento.js"></script>
<script src="/static/js/components/chart_builder.js"></script>
<script src="/static/js/components/filters.js"></script>
<script src="/static/js/components/command_palette.js"></script>
<script src="/static/js/components/geo_radar.js"></script>
<script src="/static/js/components/pipeline_reactor.js"></script>

<!-- visuals (feature-detected, degrade gracefully) -->
<script src="/static/js/visuals/volumetric.js"></script>
<script src="/static/js/visuals/halos.js"></script>

<!-- views (each registers itself) -->
<script src="/static/js/views/render_health.js"></script>
<script src="/static/js/views/render_jobs.js"></script>
<script src="/static/js/views/render_providers.js"></script>
<script src="/static/js/views/render_budget.js"></script>
<script src="/static/js/views/render_history.js"></script>
<script src="/static/js/views/render_opportunities.js"></script>
<script src="/static/js/views/render_applications.js"></script>
<script src="/static/js/views/render_debug.js"></script>
<script src="/static/js/views/render_why_three.js"></script>
</body>
</html>
